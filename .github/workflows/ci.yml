name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Install
        run: pnpm install
        working-directory: cli

      - name: Build
        run: pnpm build
        working-directory: cli

      - name: Bundle
        run: pnpm bundle
        working-directory: cli

      - name: Verify bundle
        run: node dist/wai.cjs --version
        working-directory: cli
